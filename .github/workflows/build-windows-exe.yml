name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set app version from Git tag
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"   # v2.0.2 or main
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $ver = $Matches[1]
          } else {
            $ver = "0.0.0-dev"
          }

          "# Single-source version for the HTR Race Charts Converter." | Out-File -Encoding utf8 src/version.py
          "" | Out-File -Encoding utf8 -Append src/version.py
          "__version__ = `"$ver`"" | Out-File -Encoding utf8 -Append src/version.py

          Write-Host "Set src/version.py to version $ver"
          Get-Content src/version.py

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean --noconfirm HTR_RaceCharts_Converter.onefile.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: HTR_RaceCharts_Converter-${{ github.ref_name }}-windows-exe
          path: dist/HTR_RaceCharts_Converter.exe
          if-no-files-found: error
